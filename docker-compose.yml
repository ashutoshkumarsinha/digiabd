services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: digiabd-postgres
    environment:
      POSTGRES_USER: digiabd
      POSTGRES_PASSWORD: digiabd
      POSTGRES_DB: digiabd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digiabd -d digiabd"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: digiabd-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: digiabd-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: digiabd
      MINIO_ROOT_PASSWORD: digiabd-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 digiabd digiabd-secret &&
      mc mb --ignore-existing local/digiabd-files &&
      exit 0;
      "

  redpanda:
    image: redpandadata/redpanda:v24.3.1
    container_name: digiabd-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: digiabd-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      signoz:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://digiabd:digiabd@postgres:5432/digiabd
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
      KAFKA_ENABLED: "true"
      AUTH_MODE: hybrid
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: digiabd
      S3_SECRET_KEY: digiabd-secret
      S3_BUCKET: digiabd-files
      S3_USE_SSL: "false"
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: digiabd-api
      OTEL_SERVICE_VERSION: 0.4.0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz:4318
      OTEL_METRIC_EXPORT_INTERVAL_MS: 10000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/app/src:ro

  signoz:
    image: signoz/signoz-standalone:latest
    container_name: digiabd-signoz
    privileged: true
    ports:
      - "8080:8080"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - signoz_data:/var/lib/signoz
      - signoz_clickhouse:/var/lib/clickhouse

volumes:
  postgres_data:
  minio_data:
  signoz_data:
  signoz_clickhouse:
