{{- if .Values.redpanda.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digiabd.fullname" . }}-redpanda
  labels:
    {{- include "digiabd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "digiabd.name" . }}-redpanda
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "digiabd.name" . }}-redpanda
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: redpanda
          image: {{ .Values.redpanda.image }}
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp=1
            - --memory=512M
            - --reserve-memory=0M
            - --node-id=0
            - --check=false
            - --kafka-addr=internal://0.0.0.0:9092
            - --advertise-kafka-addr=internal://{{ include "digiabd.fullname" . }}-redpanda:9092
          ports:
            - containerPort: {{ .Values.redpanda.service.port }}
              name: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "digiabd.fullname" . }}-redpanda
  labels:
    {{- include "digiabd.labels" . | nindent 4 }}
spec:
  ports:
    - name: kafka
      port: {{ .Values.redpanda.service.port }}
      targetPort: kafka
  selector:
    app.kubernetes.io/name: {{ include "digiabd.name" . }}-redpanda
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
