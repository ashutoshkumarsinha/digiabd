{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digiabd.fullname" . }}-keycloak
  labels:
    {{- include "digiabd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "digiabd.name" . }}-keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "digiabd.name" . }}-keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: {{ .Values.keycloak.service.port }}
              name: http
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ include "digiabd.fullname" . }}-keycloak-db:{{ .Values.keycloakDb.service.port }}/$(KEYCLOAK_DB_NAME)"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "digiabd.fullname" . }}-secrets
                  key: KEYCLOAK_DB_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "digiabd.fullname" . }}-secrets
                  key: KEYCLOAK_DB_PASSWORD
            - name: KEYCLOAK_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "digiabd.fullname" . }}-secrets
                  key: KEYCLOAK_DB_NAME
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "digiabd.fullname" . }}-secrets
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "digiabd.fullname" . }}-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm
          configMap:
            name: {{ include "digiabd.fullname" . }}-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "digiabd.fullname" . }}-keycloak
  labels:
    {{- include "digiabd.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.keycloak.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "digiabd.name" . }}-keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
