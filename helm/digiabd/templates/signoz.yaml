{{- if .Values.signoz.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "digiabd.fullname" . }}-signoz
  labels:
    {{- include "digiabd.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "digiabd.fullname" . }}-signoz
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "digiabd.name" . }}-signoz
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "digiabd.name" . }}-signoz
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: signoz
          image: {{ .Values.signoz.image }}
          securityContext:
            privileged: true
          ports:
            - containerPort: {{ .Values.signoz.service.uiPort }}
              name: ui
            - containerPort: {{ .Values.signoz.service.otlpGrpcPort }}
              name: otlp-grpc
            - containerPort: {{ .Values.signoz.service.otlpHttpPort }}
              name: otlp-http
          volumeMounts:
            - name: signoz-data
              mountPath: /var/lib/signoz
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
  volumeClaimTemplates:
    - metadata:
        name: signoz-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.signoz.persistence.signozSize }}
    - metadata:
        name: clickhouse-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.signoz.persistence.clickhouseSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "digiabd.fullname" . }}-signoz
  labels:
    {{- include "digiabd.labels" . | nindent 4 }}
spec:
  ports:
    - name: ui
      port: {{ .Values.signoz.service.uiPort }}
      targetPort: ui
    - name: otlp-grpc
      port: {{ .Values.signoz.service.otlpGrpcPort }}
      targetPort: otlp-grpc
    - name: otlp-http
      port: {{ .Values.signoz.service.otlpHttpPort }}
      targetPort: otlp-http
  selector:
    app.kubernetes.io/name: {{ include "digiabd.name" . }}-signoz
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
