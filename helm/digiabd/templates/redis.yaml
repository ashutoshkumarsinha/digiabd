{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digiabd.fullname" . }}-redis
  labels:
    {{- include "digiabd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "digiabd.name" . }}-redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "digiabd.name" . }}-redis
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: {{ .Values.redis.service.port }}
              name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "digiabd.fullname" . }}-redis
  labels:
    {{- include "digiabd.labels" . | nindent 4 }}
spec:
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
  selector:
    app.kubernetes.io/name: {{ include "digiabd.name" . }}-redis
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
