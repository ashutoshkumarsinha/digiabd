name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: digiabd
          POSTGRES_PASSWORD: digiabd
          POSTGRES_DB: digiabd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U digiabd -d digiabd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: |
          PGPASSWORD=digiabd psql -h localhost -U digiabd -d digiabd -f database/migrations/001_initial_schema.sql
          PGPASSWORD=digiabd psql -h localhost -U digiabd -d digiabd -f database/migrations/002_phase2.sql
        env:
          PGPASSWORD: digiabd

      - name: Lint API
        run: npm run lint -w @digiabd/api

      - name: Test API
        run: npm run test -w @digiabd/api

      - name: Build API
        run: npm run build -w @digiabd/api
        env:
          JWT_SECRET: ci-test-secret
          DATABASE_URL: postgresql://digiabd:digiabd@localhost:5432/digiabd
